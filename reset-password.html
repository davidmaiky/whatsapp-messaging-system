<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resetar Senha - Admin</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
            max-width: 500px;
            width: 100%;
        }
        h1 {
            color: #059669;
            margin-bottom: 10px;
            font-size: 28px;
        }
        .subtitle {
            color: #6b7280;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #374151;
            font-weight: 500;
            font-size: 14px;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.3s;
        }
        input:focus {
            outline: none;
            border-color: #10b981;
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1);
        }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(16, 185, 129, 0.3);
        }
        button:active {
            transform: translateY(0);
        }
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .message {
            padding: 12px;
            border-radius: 8px;
            margin-top: 20px;
            font-size: 14px;
            display: none;
        }
        .message.success {
            background: #d1fae5;
            color: #065f46;
            border: 1px solid #10b981;
        }
        .message.error {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #ef4444;
        }
        .message.show {
            display: block;
        }
        .info-box {
            background: #f3f4f6;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            color: #4b5563;
        }
        .info-box strong {
            color: #1f2937;
        }
        .check-btn {
            background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔧 Resetar Senha</h1>
        <p class="subtitle">Ferramenta de administração do sistema</p>
        
        <div class="info-box">
            <strong>ℹ️ Informação:</strong> Use esta página para verificar o sistema e resetar a senha de qualquer usuário.
        </div>

        <button class="check-btn" onclick="checkSystem()">🔍 Verificar Sistema</button>
        
        <form id="resetForm" onsubmit="resetPassword(event)">
            <div class="form-group">
                <label for="email">Email do Usuário</label>
                <input 
                    type="email" 
                    id="email" 
                    name="email" 
                    placeholder="admin@admin.com"
                    required
                >
            </div>
            
            <div class="form-group">
                <label for="password">Nova Senha</label>
                <input 
                    type="text" 
                    id="password" 
                    name="password" 
                    placeholder="Digite a nova senha"
                    required
                >
            </div>
            
            <button type="submit" id="submitBtn">🔐 Resetar Senha</button>
        </form>
        
        <div id="message" class="message"></div>
    </div>

    <script>
        async function checkSystem() {
            const messageDiv = document.getElementById('message');
            messageDiv.className = 'message';
            messageDiv.textContent = 'Verificando sistema...';
            messageDiv.classList.add('show');
            
            try {
                const response = await fetch('/api/system/check');
                const data = await response.json();
                
                messageDiv.className = 'message success show';
                messageDiv.innerHTML = `
                    <strong>✅ Status do Sistema:</strong><br><br>
                    <strong>Tabelas:</strong> ${data.tables.map(t => t.name).join(', ')}<br><br>
                    <strong>Total de usuários:</strong> ${data.userCount}<br><br>
                    <strong>Usuários cadastrados:</strong><br>
                    ${data.users.map(u => `• ${u.username} (${u.email}) - Perfil: ${u.role}`).join('<br>')}
                `;
            } catch (error) {
                messageDiv.className = 'message error show';
                messageDiv.textContent = `❌ Erro ao verificar sistema: ${error.message}`;
            }
        }

        async function resetPassword(event) {
            event.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const submitBtn = document.getElementById('submitBtn');
            const messageDiv = document.getElementById('message');
            
            submitBtn.disabled = true;
            submitBtn.textContent = '⏳ Resetando...';
            
            try {
                const response = await fetch('/api/system/reset-password', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        email: email,
                        newPassword: password
                    })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    messageDiv.className = 'message success show';
                    messageDiv.textContent = `✅ ${data.message}! Você já pode fazer login com a nova senha.`;
                    document.getElementById('resetForm').reset();
                } else {
                    messageDiv.className = 'message error show';
                    messageDiv.textContent = `❌ ${data.error}`;
                }
            } catch (error) {
                messageDiv.className = 'message error show';
                messageDiv.textContent = `❌ Erro ao resetar senha: ${error.message}`;
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = '🔐 Resetar Senha';
            }
        }
    </script>
</body>
</html>
